# =============================================================
# Acciones ElBosque — application.properties
# NUNCA hardcodear secretos reales aquí en producción.
# En producción, sobreescribir con variables de entorno.
# =============================================================

spring.application.name=accioneselbosque
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# -------------------------------------------------------------
# PostgreSQL — ajusta estos valores según tu instalación local.
# Pasos para crear la BD:
#   1. Abre psql como superusuario: psql -U postgres
#   2. CREATE DATABASE acciones_elbosque;
#   3. (Opcional) CREATE USER bosque_user WITH PASSWORD 'bosque_pass';
#      GRANT ALL PRIVILEGES ON DATABASE acciones_elbosque TO bosque_user;
#   4. Actualiza spring.datasource.username y .password abajo.
# -------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/accioneselbosque}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -------------------------------------------------------------
# SMTP / Gmail con App Password
# Pasos para obtener el App Password de Gmail:
#   1. Activa la verificación en 2 pasos en tu cuenta Google.
#   2. Ve a Cuenta → Seguridad → Contraseñas de aplicaciones.
#   3. Crea una contraseña para "Acciones ElBosque Backend".
#   4. Pega la contraseña de 16 caracteres en mail.password.
# -------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME:youtyeiko@gmail.com}
spring.mail.password=${SMTP_PASSWORD:CAMBIAR_EN_ENV}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# Nombre visible en los correos enviados
app.mail.remitente.nombre=Acciones ElBosque

# -------------------------------------------------------------
# JWT
# Este secret fue generado aleatoriamente (256 bits / Base64).
# EN PRODUCCIÓN: reemplazar con variable de entorno APP_JWT_SECRET.
# -------------------------------------------------------------
app.jwt.secret=${APP_JWT_SECRET:CAMBIAR_EN_ENV}
app.jwt.expiracion-ms=3600000

# -------------------------------------------------------------
# Parámetros de seguridad (reglas de negocio fijas)
# -------------------------------------------------------------
# Minutos de bloqueo tras 5 intentos fallidos
app.seguridad.bloqueo-minutos=15
# Intentos fallidos antes de bloquear
app.seguridad.max-intentos=5
# Minutos de validez del código MFA / registro
app.seguridad.codigo-expiracion-minutos=10
# Minutos de validez del token de recuperación de contraseña
app.seguridad.recuperacion-expiracion-minutos=30

# Password inicial para comisionistas seed de desarrollo. Cambiar via variable en ambientes reales.
app.comisionistas.password-default=${COMISIONISTAS_PASSWORD_DEFAULT:Comisionista123!}

# -------------------------------------------------------------
# Alpaca Broker API (sandbox) — para crear cuentas de usuario y ejecutar órdenes
# Obtener en: https://broker.alpaca.markets → Dashboard → API Keys (sandbox)
# IMPORTANTE: estas son credenciales del BROKER API, distintas a las del Trading API.
# Pasos: 1) Regístrate en https://broker.alpaca.markets
#         2) Ve a Settings → API Keys → Generate Sandbox Key
#         3) Pega la Key y Secret aquí.
# -------------------------------------------------------------
alpaca.broker.base-url=https://broker-api.sandbox.alpaca.markets
alpaca.broker.api-key=${ALPACA_BROKER_API_KEY:CAMBIAR_EN_ENV}
alpaca.broker.api-secret=${ALPACA_BROKER_API_SECRET:CAMBIAR_EN_ENV}
# -------------------------------------------------------------
# Alpaca Market Data API + Trading API (paper trading)
# Estas son las credenciales de Trading (app.alpaca.markets → Paper Trading → API Keys).
# Se usan para snapshots de precios. YA ESTÁN CONFIGURADAS Y FUNCIONAN.
# -------------------------------------------------------------
alpaca.data.base-url=https://data.alpaca.markets
alpaca.data.api-key=${ALPACA_DATA_API_KEY:CAMBIAR_EN_ENV}
alpaca.data.api-secret=${ALPACA_DATA_API_SECRET:CAMBIAR_EN_ENV}

# -------------------------------------------------------------
# Stripe (test mode)
# Obtener en: https://dashboard.stripe.com/test/apikeys
# Crear precios en: https://dashboard.stripe.com/test/products
# -------------------------------------------------------------
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:CAMBIAR_EN_ENV}
stripe.secret-key=${STRIPE_SECRET_KEY:CAMBIAR_EN_ENV}
stripe.price-id.premium-mensual=${STRIPE_PRICE_ID_PREMIUM_MENSUAL:CAMBIAR_EN_ENV}
stripe.price-id.premium-anual=${STRIPE_PRICE_ID_PREMIUM_ANUAL:CAMBIAR_EN_ENV}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:4200}
stripe.success-url=${app.frontend.base-url}/login?stripe_success=true&session_id={CHECKOUT_SESSION_ID}
stripe.cancel-url=${app.frontend.base-url}/login?stripe_cancel=true

# -------------------------------------------------------------
# Alpha Vantage (datos globales: TSE, LSE, ASX, etc.)
# Obtener clave gratuita en: https://www.alphavantage.co/support/#api-key
# -------------------------------------------------------------
alphavantage.api-key=${ALPHAVANTAGE_API_KEY:CAMBIAR_EN_ENV}
alphavantage.base-url=https://www.alphavantage.co

# -------------------------------------------------------------
# Parámetros de comisiones (EC-18: se leen de BD en producción,
# aquí son los defaults que carga ParametroSistema al arrancar)
# -------------------------------------------------------------
app.comision.porcentaje=2.0
app.comision.split-plataforma=60.0
app.comision.split-comisionista=40.0

# -------------------------------------------------------------
# Mercado
# sandbox-siempre-abierto=true  → ignora horarios (útil para pruebas fuera de horario NYSE)
# sandbox-siempre-abierto=false → respeta horarios reales (producción)
# -------------------------------------------------------------
app.mercado.sandbox-siempre-abierto=false
# sandbox-ejecutar-sin-broker=true → cuando Alpaca rechaza por fondos, ejecuta la orden localmente (solo demos/pruebas)
app.ordenes.sandbox-ejecutar-sin-broker=true

# -------------------------------------------------------------
# Twilio — SMS y WhatsApp (HU-41)
# Obtener en: https://console.twilio.com
# 1. Regístrate y ve a "Get a Twilio phone number".
# 2. Copia el Account SID y Auth Token de la consola principal.
# 3. Para WhatsApp: activa el Sandbox en Messaging → Try it out → Send a WhatsApp message.
#    El número sandbox de WhatsApp es siempre whatsapp:+14155238886.
#    En producción, solicita un número WhatsApp Business aprobado.
# 4. Para SMS: usa el número E.164 que te asignaron (ej. +15551234567).
# -------------------------------------------------------------
twilio.account-sid=${TWILIO_ACCOUNT_SID:CAMBIAR_EN_ENV}
twilio.auth-token=${TWILIO_AUTH_TOKEN:CAMBIAR_EN_ENV}
# Número Twilio para SMS (formato E.164: +15551234567)
twilio.sms.from=${TWILIO_SMS_FROM:CAMBIAR_EN_ENV}
# Número Twilio para WhatsApp (formato: whatsapp:+14155238886 en sandbox)
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:CAMBIAR_EN_ENV}
# Activar/desactivar canales en desarrollo (evita consumir créditos Twilio)
app.notificaciones.sms.habilitado=${NOTIF_SMS_HABILITADO:false}
app.notificaciones.whatsapp.habilitado=${NOTIF_WHATSAPP_HABILITADO:false}

# -------------------------------------------------------------
# Servidor
# -------------------------------------------------------------
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Suprimir warning de favicon.ico faltante (inofensivo)
logging.level.org.springframework.web.servlet.resource=ERROR
