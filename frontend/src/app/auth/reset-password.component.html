<div class="auth-card">
  <p class="eyebrow">Nueva clave</p>
  <h2>Cambiar contrasenia</h2>
  <p class="subtitle">Usa el codigo enviado y define una clave nueva.</p>

  <div class="hint">Correo: <strong>{{ correo() || 'sin correo guardado' }}</strong></div>

  <form [formGroup]="form" (ngSubmit)="cambiar()" class="stack" style="margin-top: 16px">
    <div class="field">
      <label for="token">Codigo</label>
      <input id="token" type="text" formControlName="token" maxlength="6" inputmode="numeric" class="code-input" />
    </div>
    <div class="field">
      <label for="nueva">Nueva contrasenia</label>
      <input id="nueva" type="password" formControlName="nuevaContrasenia" placeholder="Minimo 8 caracteres" />
    </div>
    <button class="btn" type="submit">Cambiar contrasenia</button>
  </form>

  <div class="links">
    <a routerLink="/recuperar">Enviar otro codigo</a>
    <a routerLink="/login">Login</a>
  </div>
</div>
